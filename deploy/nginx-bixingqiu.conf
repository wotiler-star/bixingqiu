# 币星球 Nginx 配置（Ubuntu 22.04 + PHP7.4-FPM）
# 部署位置：/etc/nginx/sites-available/bixingqiu.conf
# 前端已改为「同源」：浏览器访问哪个域名/IP，API 就自动指向该域名/IP 的 /service/

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 前端构建产物（React SPA, BrowserRouter）
    root /var/www/bixingqiu/html0113/build;
    index index.html;

    # 前端路由回退（BrowserRouter 刷新不 404）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API：/service/ -> service/index.php
    location ^~ /service/ {
        root /var/www/bixingqiu;
        index index.php;

        # 重写到统一入口
        try_files $uri $uri/ /service/index.php?$query_string;

        location ~* \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php7.4-fpm.sock;
            # 防直接访问敏感文件
            location ~* /(config|\.env|\.git) {
                deny all;
                return 404;
            }
        }
    }

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 隐藏敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
